name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: ctype, json, mbstring, openssl, pdo
          coverage: none
          tools: composer

      - name: Validate composer.json
        run: composer validate --strict --no-check-publish

      - name: Composer audit
        run: composer audit || true

      - name: Install (locked / latest)
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: PHP syntax check
        run: find src tests -name '*.php' -print0 | xargs -0 -n1 -P4 php -l

  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4', '8.5']

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: ctype, json, mbstring, openssl, pdo
          coverage: none

      - name: Install Composer dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Run PHPUnit
        run: vendor/bin/phpunit

  lowest-deps:
    name: PHPUnit (lowest deps, PHP 8.4)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: ctype, json, mbstring, openssl, pdo
          coverage: none

      - name: Install lowest compatible versions
        run: composer update --prefer-lowest --prefer-stable --no-interaction --no-progress

      - name: Run PHPUnit
        run: vendor/bin/phpunit
