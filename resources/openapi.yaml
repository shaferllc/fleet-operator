openapi: 3.0.3
info:
  title: Fleet operator API (app surface)
  description: |
    Exposed by each monitored application for Fleet Console (and compatible tools).
    Typical path prefix is `/api/operator`; some hosts use `/api/v1/operator`.
    Authenticate with `Authorization: Bearer <FLEET_OPERATOR_TOKEN>`.

    **Summary** responses are JSON objects. Documented properties below are optional;
    you may add any extra keys (Fleet stores the full JSON and can alert on numeric paths).

    **Readme** returns JSON with a required `content` string (usually Markdown) and optional metadata.
  version: 1.1.0
servers:
  - url: /
    description: Same origin; prefix paths below with your operator_path_prefix.
paths:
  /summary:
    get:
      summary: Operator metrics / health snapshot
      security:
        - bearerAuth: []
      responses:
        '200':
          description: |
            Snapshot JSON. All top-level fields are optional unless noted.
            Fleet Console renders known fields on dashboard cards; unknown fields are still stored.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperatorSummary'
        '401':
          description: Missing or invalid bearer token
        '404':
          description: Operator API disabled (token not configured on app)
  /readme:
    get:
      summary: Project README for in-console rendering
      security:
        - bearerAuth: []
      responses:
        '200':
          description: README payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperatorReadme'
        '401':
          description: Missing or invalid bearer token
        '404':
          description: Operator API disabled
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    OperatorSummary:
      type: object
      additionalProperties: true
      description: |
        Optional keys recognized by Fleet Console UI (all optional).
        Use `metrics` for arbitrary counters; use `FLEET_ALERT_METRIC_RULES` in Fleet for min/max alerts on dot paths.
      properties:
        app:
          type: string
          description: Short service id (e.g. product slug) shown on the card.
        service:
          type: string
          description: Alias for `app` if `app` is omitted.
        version:
          type: string
          description: Release or semver string.
        git_sha:
          type: string
          description: Full VCS revision; UI shows a short prefix.
        commit:
          type: string
          description: Alias for `git_sha`.
        runtime:
          type: string
          description: Runtime line (e.g. `PHP 8.4.5`).
        php_version:
          type: string
          description: Shown as runtime if `runtime` is omitted.
        uptime_seconds:
          type: integer
          minimum: 0
          description: Process or app uptime in seconds; formatted on the card.
        region:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
          description: Region label(s).
        deployed_at:
          type: string
          description: ISO-8601 or human-readable deploy time.
        build_at:
          type: string
          description: Alias for `deployed_at`.
        environment:
          type: string
        generated_at:
          type: string
        users:
          type: number
        organizations:
          type: number
          nullable: true
        notes:
          type: string
          description: Short status line; shown in a highlighted strip on the card.
        status_message:
          type: string
          description: Alias for `notes`.
        links:
          type: object
          additionalProperties:
            type: string
            format: uri
          description: Label → HTTPS URL; rendered as link chips on the card.
        dependencies:
          type: array
          description: Dependency health rows.
          items:
            type: object
            required:
              - name
            properties:
              name:
                type: string
              id:
                type: string
                description: Alias for `name`.
              ok:
                type: boolean
                description: Default true if omitted.
              healthy:
                type: boolean
                description: Alias for `ok`.
              detail:
                type: string
              message:
                type: string
                description: Alias for `detail`.
              error:
                type: string
                description: Alias for `detail`.
        metrics:
          type: object
          additionalProperties: true
          description: Arbitrary key/value metrics (scalars shown on the card).

    OperatorReadme:
      type: object
      required:
        - content
      properties:
        content:
          type: string
          description: Raw README body (typically Markdown).
        format:
          type: string
          example: markdown
          description: Hint for clients; Fleet shows it as a label when set.
        title:
          type: string
          description: Overrides the page heading and document title in Fleet Console.
        subtitle:
          type: string
          description: Shown under the title on the README page.
